name: homelab
services:
  hister:
    image: ghcr.io/asciimoo/hister:latest
    container_name: hister
    user: '1000:1000'
    restart: unless-stopped
    volumes:
      - ./hister:/hister/data
    ports:
      - 4433:4433

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: always
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng
      - ./searxng/cache:/var/cache/searxng
    environment:
      # Required locally; keep the real value out of chezmoi.
      - SEARXNG_SECRET=dummy
      # - SEARXNG_BASE_URL=http://localhost:8888/
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - searxng-valkey

  searxng-valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - ./searxng-valkey:/data

  bifrost:
    container_name: bifrost
    image: maximhq/bifrost
    restart: always
    volumes:
      - ./bifrost:/app/data
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=sk-ant-dummy
      - MISTRAL_API_KEY
      - OPENAI_API_KEY=sk-dummy
      - OPENCODE_API_KEY
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - cli-proxy-api

  cli-proxy-api:
    container_name: cli-proxy-api
    image: eceasy/cli-proxy-api
    restart: always
    ports:
      - "8317:8317"
    volumes:
      - ./cli-proxy-api/config.yaml:/CLIProxyAPI/config.yaml
      - ./cli-proxy-api/auths:/root/.cli-proxy-api
      - ./cli-proxy-api/logs:/CLIProxyAPI/logs
